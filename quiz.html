<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你的人生下半场入场券 | Creative Life</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #d4a574 0%, #c49464 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #d4a574 0%, #c49464 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; font-weight: 600; }
        .header p { font-size: 16px; opacity: 0.95; }
        .progress-bar { height: 4px; background: #e8e0d5; position: relative; }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #d4a574, #c49464);
            transition: width 0.3s ease;
            width: 0%;
        }
        .content { padding: 30px; }
        .question-container { display: none; }
        .question-container.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .question-number {
            color: #d4a574;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .question-text {
            font-size: 20px;
            color: #333;
            margin-bottom: 25px;
            font-weight: 500;
            line-height: 1.5;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            padding: 18px 20px;
            border: 2px solid #e8e0d5;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: white;
            font-size: 16px;
            color: #444;
            text-align: left;
            font-family: inherit;
        }
        .option:hover {
            border-color: #d4a574;
            background: #faf7f2;
            transform: translateX(4px);
        }
        .option.selected {
            border-color: #d4a574;
            background: #d4a574;
            color: white;
        }
        .result-container { display: none; animation: fadeIn 0.5s ease; }
        .result-container.active { display: block; }
        .result-icon { font-size: 64px; text-align: center; margin-bottom: 20px; }
        .result-title {
            font-size: 24px;
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .result-subtitle {
            font-size: 18px;
            color: #d4a574;
            text-align: center;
            margin-bottom: 25px;
            font-weight: 500;
        }
        .result-content {
            background: #faf7f2;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
        }
        .result-content h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .result-content p {
            color: #555;
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 15px;
        }
        .result-content ul { margin-left: 20px; color: #555; }
        .result-content li { margin-bottom: 8px; line-height: 1.6; }
        .cta-section {
            background: linear-gradient(135deg, #d4a574 0%, #c49464 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }
        .cta-section h3 { font-size: 20px; margin-bottom: 10px; }
        .cta-section p { font-size: 15px; margin-bottom: 20px; opacity: 0.95; }
        .email-form {
            display: flex;
            gap: 10px;
            max-width: 400px;
            margin: 0 auto;
        }
        .email-input {
            flex: 1;
            padding: 14px 18px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        .submit-btn {
            padding: 14px 28px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 500;
            transition: transform 0.2s;
            white-space: nowrap;
        }
        .submit-btn:hover { transform: scale(1.05); }
        .submit-btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }
        .success-icon { font-size: 48px; margin-bottom: 15px; }
        .success-title { font-size: 22px; margin-bottom: 10px; }
        .trust-badge {
            font-size: 13px;
            opacity: 0.8;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .start-screen { text-align: center; padding: 40px 30px; }
        .start-screen h2 { font-size: 24px; color: #333; margin-bottom: 15px; }
        .start-screen p { color: #666; font-size: 16px; margin-bottom: 30px; line-height: 1.7; }
        .start-btn {
            display: inline-block;
            padding: 16px 48px;
            background: linear-gradient(135deg, #d4a574 0%, #c49464 100%);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 165, 116, 0.4);
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #d4a574;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { text-decoration: underline; }
        @media (max-width: 600px) {
            .header h1 { font-size: 24px; }
            .question-text { font-size: 18px; }
            .option { padding: 16px; font-size: 15px; }
            .email-form { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎫 你的人生下半场入场券</h1>
            <p>7道题，找到你的第二人生原型</p>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="content">
            <div class="start-screen active" id="startScreen">
                <h2>测测你的人生下半场，会以哪种方式开场？</h2>
                <p>45+不是终点，是第二人生的起点。<br>有人还在躺平蓄力，有人已经开始奔跑。<br>7道题，帮你看到现在的自己。</p>
                <button class="start-btn" onclick="startQuiz()">开始测试</button>
                <br>
                <a href="index.html" class="back-link">← 返回首页</a>
            </div>
            <div class="question-container" id="q1">
                <div class="question-number">Question 1 of 7</div>
                <div class="question-text">周五晚上，你最可能的状态是？</div>
                <div class="options">
                    <button class="option" onclick="selectOption(1, 'A')">A. 一个人待着，看书、刷剧、发发呆，享受不被打扰的时光</button>
                    <button class="option" onclick="selectOption(1, 'B')">B. 和朋友/家人聚会，聊天吃饭，觉得充电就得靠人际连接</button>
                    <button class="option" onclick="selectOption(1, 'C')">C. 学点新东西，上在线课、捣鼓AI工具，闲着反而不舒服</button>
                    <button class="option" onclick="selectOption(1, 'D')">D. 整理下周计划，已经有明确想做的事，趁周末推进一点</button>
                </div>
            </div>
            <div class="question-container" id="q2">
                <div class="question-number">Question 2 of 7</div>
                <div class="question-text">如果明天开始有30天长假，你会？</div>
                <div class="options">
                    <button class="option" onclick="selectOption(2, 'A')">A. 什么都不安排，睡到自然醒，先把这些年缺的觉补回来</button>
                    <button class="option" onclick="selectOption(2, 'B')">B. 约人出游或回老家陪父母，觉得时间要花在重要的人身上</button>
                    <button class="option" onclick="selectOption(2, 'C')">C. 启动那个想了很久但没空做的小项目，趁假期试试水</button>
                    <button class="option" onclick="selectOption(2, 'D')">D. 闭关执行早已列好的计划，30天足够跑出第一个里程碑</button>
                </div>
            </div>
            <div class="question-container" id="q3">
                <div class="question-number">Question 3 of 7</div>
                <div class="question-text">听到"退休"这个词，你的第一反应是？</div>
                <div class="options">
                    <button class="option" onclick="selectOption(3, 'A')">A. 终于解放了，可以不用为钱奔波，想干嘛干嘛</button>
                    <button class="option" onclick="selectOption(3, 'B')">B. 有点慌，感觉和社会脱节，不知道该用时间做什么</button>
                    <button class="option" onclick="selectOption(3, 'C')">C. 换个方式继续工作，但要做自己真正想做的事</button>
                    <button class="option" onclick="selectOption(3, 'D')">D. 这只是人生下一章的开始，已经想好了要怎么过</button>
                </div>
            </div>
            <div class="question-container" id="q4">
                <div class="question-number">Question 4 of 7</div>
                <div class="question-text">面对一个新工具（比如AI），你的态度是？</div>
                <div class="options">
                    <button class="option" onclick="selectOption(4, 'A')">A.
